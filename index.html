<style>
body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
#info { font-size: 20px; margin: 10px; font-weight:bold; }
#wallInfo { font-size: 18px; margin-bottom: 10px; }
#roomInfo { font-size: 16px; margin-bottom: 10px; }

#timerBox{
    display:inline-block;
    margin-bottom:10px;
    padding:10px 20px;
    border:3px solid #333;
    border-radius:12px;
    background:#fff;
    font-size:24px;
    font-weight:bold;
    min-width:160px;
}

.timerDanger{
    color:red;
    animation: blinkAnim 1s infinite;
}

.board-wrapper {
    position: relative;
    width: fit-content;
    margin: auto;
}

.board {
    display: grid;
    grid-template-columns: repeat(9, 50px);
    grid-template-rows: repeat(9, 50px);
    gap: 4px;
}

.cell {
    width: 50px;
    height: 50px;
    background: #fff;
    border: 1px solid #999;
    position: relative;
}

.highlight {
    background: #bde5ff !important;
}

.gap-layer {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
}

.wall-h, .wall-v {
    position: absolute;
}

.wall {
    background: black;
}

.preview {
    background: rgba(0,0,0,0.3);
}

.invalid {
    background: rgba(255,0,0,0.6);
}

.player1, .player2 {
    border-radius: 50%;
    width: 80%;
    height: 80%;
    position: absolute;
    top: 10%;
    left: 10%;
}

.player1 { background: red; }
.player2 { background: blue; }

.blink {
    animation: blinkAnim 1s infinite;
}

@keyframes blinkAnim {
    0% { opacity:1; }
    50% { opacity:0.3; }
    100% { opacity:1; }
}

button {
    margin-top: 15px;
    padding: 20px 30px;
    font-size: 20px;
    border-radius: 10px;
    cursor: pointer;
}

.activeMode {
    background: #ffe066;
    animation: modeBlink 1s infinite;
}

@keyframes modeBlink {
    0% { opacity:1; }
    50% { opacity:0.5; }
    100% { opacity:1; }
}
</style>
</head>

<body>

<h2>コリドール</h2>

<div id="info"></div>

<div id="timerBox">
    残り時間:
    <span id="timer">30</span>
    秒
</div>

<div id="wallInfo"></div>
<div id="roomInfo"></div>

<div class="board-wrapper">
    <div class="board" id="board"></div>
    <div class="gap-layer" id="gapLayer"></div>
</div>

<button id="moveBtn" onclick="setMode('move')">移動</button>
<button id="wallBtn" onclick="setMode('wall')">壁</button>
<button onclick="rotateWall()">回転</button>

<script>

/* =========================
   Firebase設定
========================= */

const firebaseConfig = {
  apiKey: "AIzaSyBSv8dNEEvleEPIWXKsDr1leo44wczWUQ",
  authDomain: "t0kz-8a295.firebaseapp.com",
  databaseURL: "https://t0kz-8a295-default-rtdb.firebaseio.com",
  projectId: "t0kz-8a295",
  storageBucket: "t0kz-8a295.firebasestorage.app",
  messagingSenderId: "340993512959",
  appId: "1:340993512959:web:3ead34afce689ecba703ca"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* =========================
   ルーム機能
========================= */

const roomsRef = db.ref("rooms");

let roomId = null;
let roomRef = null;
let playerRef = null;

async function assignRoom(){

    const snap = await roomsRef.once("value");
    const rooms = snap.val() || {};

    for(const id in rooms){

        const r = rooms[id];
        const p = r.players || {};

        if(!p.p1 || !p.p2){

            roomId = id;
            roomRef = roomsRef.child(roomId);
            playerRef = roomRef.child("players");

            return;
        }

    }

    roomId = "room_" + Date.now();

    roomRef = roomsRef.child(roomId);
    playerRef = roomRef.child("players");

    await roomRef.set({
        players:{
            p1:null,
            p2:null
        },

        game:{
            player1:{x:4,y:0},
            player2:{x:4,y:8},
            currentPlayer:1,
            firstPlayer:1,
            mode:"move",
            walls:[],
            wallsLeft:{
                1:10,
                2:10
            },
            gameStarted:false
        },

        createdAt:Date.now(),
        lastActive:Date.now()
    });

}

/* =========================
   基本変数
========================= */

const board = document.getElementById("board");
const gapLayer = document.getElementById("gapLayer");

const moveBtn = document.getElementById("moveBtn");
const wallBtn = document.getElementById("wallBtn");

const CELL = 50;
const GAP = 4;
const STEP = CELL + GAP;

let player1 = {x:4, y:0};
let player2 = {x:4, y:8};

let currentPlayer = 1;
let firstPlayer = 1;

let myPlayer = null;
let initialized = false;

let mode = "move";

let walls = [];
let tempWall = null;

let wallsLeft = {
    1:10,
    2:10
};

let turnTimer = null;
let timeLeft = 30;

let gameStarted = false;

const myId =
    Math.random().toString(36).slice(2);

/* =========================
   プレイヤー割り当て
========================= */

assignRoom().then(async ()=>{

    const snapshot = await playerRef.once("value");

    let players = snapshot.val() || {};

    if(!players.p1){

        myPlayer = 1;

        await playerRef.update({
            p1: myId
        });

    }else if(!players.p2){

        myPlayer = 2;

        await playerRef.update({
            p2: myId
        });

    }else{

        roomId = "room_" + Date.now();

        roomRef = roomsRef.child(roomId);
        playerRef = roomRef.child("players");

        await roomRef.set({
            players:{
                p1:myId,
                p2:null
            },

            game:{
                player1:{x:4,y:0},
                player2:{x:4,y:8},
                currentPlayer:1,
                firstPlayer:1,
                mode:"move",
                walls:[],
                wallsLeft:{
                    1:10,
                    2:10
                },
                gameStarted:false
            },

            createdAt:Date.now(),
            lastActive:Date.now()
        });

        myPlayer = 1;

    }

    initialized = true;

    startSync();

    draw();

});

/* =========================
   切断時
========================= */

window.addEventListener("beforeunload", ()=>{

    if(!playerRef) return;

    playerRef.once("value", snapshot => {

        let players = snapshot.val();

        if(!players) return;

        if(players.p1 === myId){
            playerRef.update({p1:null});
        }

        if(players.p2 === myId){
            playerRef.update({p2:null});
        }

    });

});

/* =========================
   1時間空部屋削除
========================= */

setInterval(async ()=>{

    const snap = await roomsRef.once("value");
    const rooms = snap.val() || {};

    const now = Date.now();

    for(const id in rooms){

        const r = rooms[id];

        const empty =
            !r.players?.p1 &&
            !r.players?.p2;

        const old =
            now - (r.lastActive || 0) > 3600000;

        if(empty && old){
            roomsRef.child(id).remove();
        }

    }

}, 60000);

/* =========================
   タイマー
========================= */

function startTurnTimer(){

    clearInterval(turnTimer);

    timeLeft = 30;

    updateTimerUI();

    turnTimer = setInterval(()=>{

        timeLeft--;

        updateTimerUI();

        if(timeLeft <= 0){

            clearInterval(turnTimer);

            forceRandomMove();

        }

    },1000);

}

function updateTimerUI(){

    const timerEl =
        document.getElementById("timer");

    timerEl.innerText = timeLeft;

    if(timeLeft <= 10){

        timerEl.classList.add(
            "timerDanger"
        );

    }else{

        timerEl.classList.remove(
            "timerDanger"
        );

    }

}

function forceRandomMove(){

    if(currentPlayer !== myPlayer){
        return;
    }

    let player =
        currentPlayer===1
        ? player1
        : player2;

    let moves = [];

    for(let y=0;y<9;y++){

        for(let x=0;x<9;x++){

            if(
                canMove(
                    player.x,
                    player.y,
                    x,
                    y
                )
            ){
                moves.push({x,y});
            }

        }

    }

    if(moves.length===0){
        return;
    }

    const randomMove =
        moves[
            Math.floor(
                Math.random()*moves.length
            )
        ];

    movePlayer(
        randomMove.x,
        randomMove.y
    );

}

/* =========================
   同期
========================= */

function syncGame(){

    if(!roomRef) return;

    roomRef.child("game").set({
        player1,
        player2,
        currentPlayer,
        firstPlayer,
        mode,
        walls,
        wallsLeft,
        gameStarted
    });

    roomRef.update({
        lastActive:Date.now()
    });

}

function startSync(){

    roomRef.child("game").on("value", snapshot => {

        const data = snapshot.val();

        if(!data) return;

        player1 = data.player1;
        player2 = data.player2;
        currentPlayer = data.currentPlayer;
        firstPlayer = data.firstPlayer || 1;
        mode = data.mode || "move";
        walls = data.walls || [];
        wallsLeft = data.wallsLeft || {1:10,2:10};
        gameStarted = data.gameStarted || false;

        updateModeUI();

        draw();

        if(gameStarted){

            startTurnTimer();

        }else{

            clearInterval(turnTimer);

            timeLeft = 30;

            updateTimerUI();

        }

    });

}

/* =========================
   共通
========================= */

function isMyTurn(){
    return currentPlayer === myPlayer;
}

function setMode(newMode){

    if(!isMyTurn()) return;

    mode = newMode;

    tempWall = null;

    updateModeUI();

    syncGame();

    draw();

}

function updateModeUI(){

    moveBtn.classList.remove("activeMode");
    wallBtn.classList.remove("activeMode");

    if(mode==="move"){
        moveBtn.classList.add("activeMode");
    }

    if(mode==="wall"){
        wallBtn.classList.add("activeMode");
    }

}

/* =========================
   ゴール到達可能判定
========================= */

function canReachGoal(player){

    const visited = Array.from(
        {length:9},
        ()=>Array(9).fill(false)
    );

    const queue = [{
        x:player.x,
        y:player.y
    }];

    while(queue.length){

        const {x,y} = queue.shift();

        if(visited[y][x]) continue;

        visited[y][x] = true;

        if(player === player1){

            const goal =
                firstPlayer===1 ? 8 : 0;

            if(y===goal){
                return true;
            }

        }

        if(player === player2){

            const goal =
                firstPlayer===1 ? 0 : 8;

            if(y===goal){
                return true;
            }

        }

        const dirs = [
            {dx:1,dy:0},
            {dx:-1,dy:0},
            {dx:0,dy:1},
            {dx:0,dy:-1}
        ];

        for(const d of dirs){

            const nx = x + d.dx;
            const ny = y + d.dy;

            if(nx<0 || nx>8 || ny<0 || ny>8){
                continue;
            }

            if(isBlocked(x,y,nx,ny)){
                continue;
            }

            if(!visited[ny][nx]){
                queue.push({
                    x:nx,
                    y:ny
                });
            }

        }

    }

    return false;

}

function isValidTempWall(w){

    if(!w) return true;

    walls.push(w);

    const ok =
        canReachGoal(player1) &&
        canReachGoal(player2);

    walls.pop();

    return ok;

}

/* =========================
   描画
========================= */

function draw(){

    board.innerHTML = "";
    gapLayer.innerHTML = "";

    document.getElementById("roomInfo").innerText =
        "部屋番号: " + roomId;

    for(let y=0;y<9;y++){

        for(let x=0;x<9;x++){

            const cell = document.createElement("div");

            cell.className = "cell";

            if(mode==="move" && isMyTurn()){

                let player =
                    currentPlayer===1
                    ? player1
                    : player2;

                if(canMove(player.x,player.y,x,y)){
                    cell.classList.add("highlight");
                }

            }

            if(player1.x===x && player1.y===y){

                const p = document.createElement("div");

                p.className = "player1";

                if(currentPlayer===1){
                    p.classList.add("blink");
                }

                cell.appendChild(p);

            }

            if(player2.x===x && player2.y===y){

                const p = document.createElement("div");

                p.className = "player2";

                if(currentPlayer===2){
                    p.classList.add("blink");
                }

                cell.appendChild(p);

            }

            cell.onclick = ()=>handleClick(x,y);

            board.appendChild(cell);

        }

    }

    walls.forEach(w=>{
        drawWall(w,false);
    });

    if(tempWall){

        const valid =
            isValidTempWall(tempWall);

        drawWall(tempWall,true,valid);

    }

    const infoEl =
        document.getElementById("info");

    infoEl.innerText =
        (isMyTurn()
        ? "あなたのターン"
        : "相手のターン")
        +
        " / プレイヤー" +
        currentPlayer +
        " (" +
        mode +
        ")";

    infoEl.style.color =
        currentPlayer===1
        ? "red"
        : "blue";

    document.getElementById("wallInfo").innerText =
        "壁 P1:" +
        wallsLeft[1] +
        " / P2:" +
        wallsLeft[2];

}

/* =========================
   壁描画
========================= */

function drawWall(w,isPreview,valid=true){

    const wall =
        document.createElement("div");

    wall.className =
        (w.type==="h")
        ? "wall-h"
        : "wall-v";

    if(isPreview){

        wall.classList.add(
            valid ? "preview" : "invalid"
        );

    }else{

        wall.classList.add("wall");

    }

    if(w.type==="h"){

        wall.style.width =
            (STEP*2-GAP)+"px";

        wall.style.height =
            GAP+"px";

        wall.style.left =
            (w.x*STEP)+"px";

        wall.style.top =
            ((w.y+1)*STEP-GAP)+"px";

    }else{

        wall.style.width =
            GAP+"px";

        wall.style.height =
            (STEP*2-GAP)+"px";

        wall.style.left =
            ((w.x+1)*STEP-GAP)+"px";

        wall.style.top =
            (w.y*STEP)+"px";

    }

    gapLayer.appendChild(wall);

}

/* =========================
   入力
========================= */

function handleClick(x,y){

    if(!isMyTurn()) return;

    if(mode==="move"){
        movePlayer(x,y);
    }else{
        handleWallClick(x,y);
    }

}

/* =========================
   壁処理
========================= */

function handleWallClick(x,y){

    function canPlace(x,y){
        return x<8 && y<8;
    }

    function isCross(x,y,t){

        return walls.some(w=>
            w.x===x &&
            w.y===y &&
            w.type!==t
        );

    }

    function isOverlap(x,y,t){

        return walls.some(w=>{

            if(w.type!==t){
                return false;
            }

            return t==="h"
                ? (
                    w.y===y &&
                    Math.abs(w.x-x)<=1
                )
                : (
                    w.x===x &&
                    Math.abs(w.y-y)<=1
                );

        });

    }

    if(wallsLeft[currentPlayer] <= 0){

        tempWall = null;

        draw();

        return;

    }

    if(!tempWall){

        if(canPlace(x,y)){

            tempWall = {
                x,
                y,
                type:"h"
            };

        }

    }else if(
        tempWall.x===x &&
        tempWall.y===y
    ){

        if(
            canPlace(x,y) &&
            !isCross(
                x,
                y,
                tempWall.type
            ) &&
            !isOverlap(
                x,
                y,
                tempWall.type
            )
        ){

            walls.push({...tempWall});

            const ok =
                canReachGoal(player1) &&
                canReachGoal(player2);

            if(ok){

                wallsLeft[currentPlayer]--;

                if(!gameStarted){
                    gameStarted = true;
                }

                currentPlayer =
                    currentPlayer===1
                    ? 2
                    : 1;

                syncGame();

            }else{

                walls.pop();

            }

        }

        tempWall = null;

    }else{

        if(canPlace(x,y)){

            tempWall = {
                x,
                y,
                type:tempWall.type
            };

        }

    }

    draw();

}

function rotateWall(){

    if(!isMyTurn()) return;

    if(tempWall){

        tempWall.type =
            tempWall.type==="h"
            ? "v"
            : "h";

        draw();

    }

}

/* =========================
   壁判定
========================= */

function isBlocked(x1,y1,x2,y2){

    return walls.some(w=>{

        if(w.type==="h"){

            return (

                (x1===w.x &&
                 x2===w.x &&
                 y1===w.y &&
                 y2===w.y+1)

                ||

                (x1===w.x+1 &&
                 x2===w.x+1 &&
                 y1===w.y &&
                 y2===w.y+1)

                ||

                (x2===w.x &&
                 x1===w.x &&
                 y2===w.y &&
                 y1===w.y+1)

                ||

                (x2===w.x+1 &&
                 x1===w.x+1 &&
                 y2===w.y &&
                 y1===w.y+1)

            );

        }else{

            return (

                (y1===w.y &&
                 y2===w.y &&
                 x1===w.x &&
                 x2===w.x+1)

                ||

                (y1===w.y+1 &&
                 y2===w.y+1 &&
                 x1===w.x &&
                 x2===w.x+1)

                ||

                (y2===w.y &&
                 y1===w.y &&
                 x2===w.x &&
                 x1===w.x+1)

                ||

                (y2===w.y+1 &&
                 y1===w.y+1 &&
                 x2===w.x &&
                 x1===w.x+1)

            );

        }

    });

}

/* =========================
   移動
========================= */

function canMove(px,py,x,y){

    const opponent =
        currentPlayer===1
        ? player2
        : player1;

    if(
        opponent.x===x &&
        opponent.y===y
    ){
        return false;
    }

    const dx = x - px;
    const dy = y - py;

    if(Math.abs(dx)+Math.abs(dy)===1){

        if(isBlocked(px,py,x,y)){
            return false;
        }

        return true;

    }

    const ax = opponent.x;
    const ay = opponent.y;

    if(
        Math.abs(px-ax)+
        Math.abs(py-ay)!==1
    ){
        return false;
    }

    const dirX = ax - px;
    const dirY = ay - py;

    const bx = ax + dirX;
    const by = ay + dirY;

    if(x===bx && y===by){

        if(
            bx<0 || bx>8 ||
            by<0 || by>8
        ){
            return false;
        }

        if(isBlocked(px,py,ax,ay)){
            return false;
        }

        if(isBlocked(ax,ay,bx,by)){
            return false;
        }

        return true;

    }

    const backBlocked =

        bx<0 ||
        bx>8 ||
        by<0 ||
        by>8 ||

        isBlocked(ax,ay,bx,by);

    if(backBlocked){

        if(dirX!==0){

            if(

                (
                    x===ax &&
                    y===ay+1 &&
                    !isBlocked(
                        ax,
                        ay,
                        ax,
                        ay+1
                    )
                )

                ||

                (
                    x===ax &&
                    y===ay-1 &&
                    !isBlocked(
                        ax,
                        ay,
                        ax,
                        ay-1
                    )
                )

            ){

                if(!isBlocked(px,py,ax,ay)){
                    return true;
                }

            }

        }

        if(dirY!==0){

            if(

                (
                    x===ax+1 &&
                    y===ay &&
                    !isBlocked(
                        ax,
                        ay,
                        ax+1,
                        ay
                    )
                )

                ||

                (
                    x===ax-1 &&
                    y===ay &&
                    !isBlocked(
                        ax,
                        ay,
                        ax-1,
                        ay
                    )
                )

            ){

                if(!isBlocked(px,py,ax,ay)){
                    return true;
                }

            }

        }

    }

    return false;

}

function movePlayer(x,y){

    let player =
        currentPlayer===1
        ? player1
        : player2;

    if(
        !canMove(
            player.x,
            player.y,
            x,
            y
        )
    ){
        return;
    }

    player.x = x;
    player.y = y;

    if(!gameStarted){
        gameStarted = true;
    }

    const p1Goal =
        firstPlayer===1 ? 8 : 0;

    const p2Goal =
        firstPlayer===1 ? 0 : 8;

    if(player1.y===p1Goal){

        alert("P1勝利");

        reset();

        return;

    }

    if(player2.y===p2Goal){

        alert("P2勝利");

        reset();

        return;

    }

    currentPlayer =
        currentPlayer===1
        ? 2
        : 1;

    syncGame();

    draw();

}

/* =========================
   リセット
========================= */

function reset(){

    firstPlayer =
        firstPlayer===1
        ? 2
        : 1;

    currentPlayer = firstPlayer;

    if(firstPlayer===1){

        player1 = {
            x:4,
            y:0
        };

        player2 = {
            x:4,
            y:8
        };

    }else{

        player1 = {
            x:4,
            y:8
        };

        player2 = {
            x:4,
            y:0
        };

    }

    walls = [];

    tempWall = null;

    wallsLeft = {
        1:10,
        2:10
    };

    gameStarted = false;

    clearInterval(turnTimer);

    timeLeft = 30;

    updateTimerUI();

    updateModeUI();

    syncGame();

    draw();

}

/* =========================
   初期化
========================= */

updateModeUI();

</script>
